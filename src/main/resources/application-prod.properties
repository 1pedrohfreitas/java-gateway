# PostgreSQL for production
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/apigateway}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:apigateway}
spring.datasource.password=${DATABASE_PASSWORD:apigateway}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Actuator — only expose health publicly
management.endpoints.web.exposure.include=health,info
