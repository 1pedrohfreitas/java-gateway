name: CI/CD

on:
  push:
    branches: [main, develop]

env:
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_PORT: ${{ secrets.SSH_PORT }}

jobs:

  # ==========================================================
  # Build Backend Docker image
  # ==========================================================
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_TAG="${GITHUB_SHA:0:8}"
          IMAGE_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)
          OWNER=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]')
          GHCR_PREFIX="ghcr.io/${OWNER}/${IMAGE_NAME}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          echo "GHCR_BACKEND=${GHCR_PREFIX}-backend:$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Build and push image
        run: |
          docker build \
            -t "$IMAGE_NAME-backend:$IMAGE_TAG" \
            -t "${GHCR_BACKEND}" \
            -t "${GHCR_BACKEND%:*}:latest" \
            .
          docker push "${GHCR_BACKEND}"
          docker push "${GHCR_BACKEND%:*}:latest"

  # ==========================================================
  # Build Frontend Docker image
  # ==========================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_TAG="${GITHUB_SHA:0:8}"
          IMAGE_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)
          OWNER=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]')
          GHCR_PREFIX="ghcr.io/${OWNER}/${IMAGE_NAME}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          echo "GHCR_FRONTEND=${GHCR_PREFIX}-frontend:$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Build and push image
        run: |
          docker build \
            -t "$IMAGE_NAME-frontend:$IMAGE_TAG" \
            -t "${GHCR_FRONTEND}" \
            -t "${GHCR_FRONTEND%:*}:latest" \
            frontend
          docker push "${GHCR_FRONTEND}"
          docker push "${GHCR_FRONTEND%:*}:latest"
