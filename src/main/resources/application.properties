spring.application.name=api-gateway

# Default profile is dev (H2 in-memory)
spring.profiles.active=dev

# JWT secret key (override in production via env var)
gateway.jwt.secret=change-me-in-production-use-at-least-256-bits-key

# Gateway admin endpoints base path
gateway.admin-path=/api/gateway

# WebClient/HTTP client timeouts (ms)
gateway.default-timeout=30000
gateway.max-timeout=120000
