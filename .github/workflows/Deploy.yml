name: Deploy (Full Stack)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Deploy Backend?'
        required: true
        type: boolean
        default: true
      deploy_frontend:
        description: 'Deploy Frontend?'
        required: true
        type: boolean
        default: true
      skip_tests:
        description: 'Skip tests?'
        required: false
        type: boolean
        default: false

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  SERVER_HOST: ${{ secrets.SSH_HOST }}
  SERVER_USER: ${{ secrets.SSH_USER }}
  SERVER_PORT: ${{ secrets.SSH_PORT || '22' }}
  BACKEND_DEPLOY_PATH: ${{ vars.BACKEND_DEPLOY_PATH || '/opt/api-gateway' }}
  FRONTEND_DEPLOY_PATH: ${{ vars.FRONTEND_DEPLOY_PATH || '/var/www/api-gateway-admin' }}
  VITE_API_URL: ${{ vars.VITE_API_URL || '/api/gateway' }}

jobs:
  # ============================================================
  # Backend: Test → Build → Deploy
  # ============================================================
  backend:
    name: Backend
    if: ${{ inputs.deploy_backend != false }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ env.SERVER_HOST }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        if: ${{ !inputs.skip_tests }}
        run: ./mvnw test -B

      - name: Build JAR
        run: ./mvnw clean package -DskipTests -B

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ env.SERVER_PORT }} -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Prepare server
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ env.SERVER_PORT }} ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
            "id -u api-gateway &>/dev/null || useradd -r -s /bin/false api-gateway; \
             mkdir -p ${{ env.BACKEND_DEPLOY_PATH }}; \
             chown -R api-gateway:api-gateway ${{ env.BACKEND_DEPLOY_PATH }}"

      - name: Deploy JAR
        run: |
          JAR_FILE=$(ls target/api-gateway-*.jar | grep -v original | head -1)
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -p ${{ env.SERVER_PORT }}" \
            "$JAR_FILE" ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.BACKEND_DEPLOY_PATH }}/api-gateway.jar

      - name: Update systemd & restart
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ env.SERVER_PORT }} \
            deploy/api-gateway.service \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:/etc/systemd/system/api-gateway.service

          ssh -i ~/.ssh/deploy_key -p ${{ env.SERVER_PORT }} ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
            "chown api-gateway:api-gateway ${{ env.BACKEND_DEPLOY_PATH }}/api-gateway.jar && \
             systemctl daemon-reload && \
             systemctl enable api-gateway && \
             (systemctl is-active --quiet api-gateway && systemctl restart api-gateway || systemctl start api-gateway)"

      - name: Verify backend health
        run: |
          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(ssh -i ~/.ssh/deploy_key -p ${{ env.SERVER_PORT }} ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/health" 2>/dev/null || echo "000")
            echo "Health check $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "✅ Backend OK" && exit 0
            sleep 4
          done
          echo "⚠️  Backend health check failed"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ============================================================
  # Frontend: Build → Deploy → Nginx
  # ============================================================
  frontend:
    name: Frontend
    if: ${{ inputs.deploy_frontend != false }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    environment:
      name: production
      url: https://${{ env.SERVER_HOST }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ env.SERVER_PORT }} -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy static files
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ env.SERVER_PORT }} ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
            "mkdir -p ${{ env.FRONTEND_DEPLOY_PATH }}"

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ env.SERVER_PORT }}" \
            dist/ ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.FRONTEND_DEPLOY_PATH }}/

      - name: Configure nginx
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ env.SERVER_PORT }} \
            deploy/nginx-gateway-admin.conf \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:/etc/nginx/sites-available/api-gateway-admin

          ssh -i ~/.ssh/deploy_key -p ${{ env.SERVER_PORT }} ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
            "command -v nginx || (apt-get update -qq && apt-get install -y -qq nginx) && \
             ln -sf /etc/nginx/sites-available/api-gateway-admin /etc/nginx/sites-enabled/ && \
             nginx -t && systemctl reload nginx"

      - name: Verify frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://${{ env.SERVER_HOST }}/ || echo "000")
          echo "Frontend HTTP status: $STATUS"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
