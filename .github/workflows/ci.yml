name: CI/CD

on:
  push:
    branches:
      - main
      - develop

env:
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_PORT: ${{ secrets.SSH_PORT }}

jobs:

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        run: |
          IMAGE_TAG="${GITHUB_SHA:0:8}"
          IMAGE_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)
          OWNER=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]')
          GHCR_PREFIX="ghcr.io/${OWNER}/${IMAGE_NAME}"

          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          echo "GHCR_BACKEND=${GHCR_PREFIX}-backend:$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Build and push image
        run: |
          docker build \
            -t "$IMAGE_NAME-backend:$IMAGE_TAG" \
            -t "$GHCR_BACKEND" \
            -t "${GHCR_BACKEND%:*}:latest" \
            .

          docker push "$GHCR_BACKEND"
          docker push "${GHCR_BACKEND%:*}:latest"

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        run: |
          IMAGE_TAG="${GITHUB_SHA:0:8}"
          IMAGE_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)
          OWNER=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]')
          GHCR_PREFIX="ghcr.io/${OWNER}/${IMAGE_NAME}"

          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          echo "GHCR_FRONTEND=${GHCR_PREFIX}-frontend:$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Build and push image
        run: |
          docker build \
            -t "$IMAGE_NAME-frontend:$IMAGE_TAG" \
            -t "$GHCR_FRONTEND" \
            -t "${GHCR_FRONTEND%:*}:latest" \
            frontend

          docker push "$GHCR_FRONTEND"
          docker push "${GHCR_FRONTEND%:*}:latest"

  deploy-vps:
    name: Deploy On VPS
    runs-on: ubuntu-latest

    needs:
      - build-backend
      - build-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          REPONAME=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)

          scp \
            -i ~/.ssh/deploy_key \
            -P "$SSH_PORT" \
            docker-stack.yml \
            "$SSH_USER@$SSH_HOST:/tmp/docker-stack.yml"

          ssh \
            -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            bash -s "$REPONAME" << 'DEPLOY'
          set -e

          REPO="$1"

          docker stack deploy \
            -c /tmp/docker-stack.yml \
            "$REPO" \
            --prune

          rm -f /tmp/docker-stack.yml

          docker stack services "$REPO"
          DEPLOY