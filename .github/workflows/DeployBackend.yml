name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/DeployBackend.yml'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests?'
        required: false
        type: boolean
        default: false

env:
  JAVA_VERSION: '21'

jobs:
  # ============================================================
  # Test
  # ============================================================
  test:
    name: Test (Java ${{ env.JAVA_VERSION }})
    runs-on: ubuntu-latest
    # Skip tests only if explicitly requested via workflow_dispatch
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && !inputs.skip_tests)
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: ./mvnw test -B

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Tests
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit

  # ============================================================
  # Build & Deploy
  # ============================================================
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    # Run even if test was skipped (test job skipped = needs passes with skipped)
    if: |
      !cancelled() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: ./mvnw clean package -DskipTests -B

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT || '22' }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare server
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "id -u api-gateway &>/dev/null || useradd -r -s /bin/false api-gateway; \
             mkdir -p /opt/api-gateway; \
             chown -R api-gateway:api-gateway /opt/api-gateway"

      - name: Deploy JAR
        run: |
          JAR_FILE=$(ls target/api-gateway-*.jar | grep -v original | head -1)
          echo "Uploading: $JAR_FILE"
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }}" \
            "$JAR_FILE" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/api-gateway/api-gateway.jar

      - name: Update systemd & restart
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.SSH_PORT || '22' }} \
            deploy/api-gateway.service \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/etc/systemd/system/api-gateway.service

          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "chown api-gateway:api-gateway /opt/api-gateway/api-gateway.jar && \
             systemctl daemon-reload && \
             systemctl enable api-gateway && \
             (systemctl is-active --quiet api-gateway && systemctl restart api-gateway || systemctl start api-gateway)"

      - name: Verify health
        run: |
          sleep 10
          for i in 1 2 3 4 5; do
            set +e
            STATUS=$(ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/health" 2>/dev/null) || STATUS="000"
            set -e
            echo "Health check $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend healthy"
              exit 0
            fi
            sleep 4
          done
          echo "⚠️  Health check failed — recent logs:"
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "journalctl -u api-gateway --no-pager -n 20" || true

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
