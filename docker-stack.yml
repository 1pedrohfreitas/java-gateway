version: "3.9"

networks:
  gateway-net:
    driver: overlay
    attachable: true

services:

  postgres:
    image: postgres:16-alpine
    networks:
      - gateway-net
    environment:
      POSTGRES_DB: apigateway
      POSTGRES_USER: apigateway
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apigateway}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apigateway"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  gateway:
    image: ghcr.io/1pedrohfreitas/java-gateway-backend:latest
    networks:
      - gateway-net
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/apigateway
      SPRING_DATASOURCE_USERNAME: apigateway
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-apigateway}
      GATEWAY_JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-at-least-256-bits-key}
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback

  frontend:
    image: ghcr.io/1pedrohfreitas/java-gateway-frontend:latest
    networks:
      - gateway-net
    ports:
      - "8089:80"
    depends_on:
      - gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first

volumes:
  pgdata:
