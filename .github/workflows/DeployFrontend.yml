name: Deploy Admin Panel

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/DeployFrontend.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  # ============================================================
  # Build & Deploy
  # ============================================================
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || '/api/gateway' }}

      - name: Verify build output
        run: |
          if [ ! -f dist/index.html ]; then
            echo "ERROR: Build failed — dist/index.html not found"
            exit 1
          fi
          echo "Build size: $(du -sh dist | cut -f1)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT || '22' }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare server directory
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /var/www/api-gateway-admin"

      - name: Deploy static files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }}" \
            dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/api-gateway-admin/

      - name: Configure nginx
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.SSH_PORT || '22' }} \
            ../deploy/nginx-gateway-admin.conf \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/etc/nginx/sites-available/api-gateway-admin

          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "command -v nginx || (apt-get update -qq && apt-get install -y -qq nginx); \
             ln -sf /etc/nginx/sites-available/api-gateway-admin /etc/nginx/sites-enabled/; \
             nginx -t && systemctl reload nginx"

      - name: Verify deployment
        run: |
          set +e
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://${{ secrets.SSH_HOST }}/ 2>/dev/null) || STATUS="000"
          set -e
          echo "Frontend HTTP status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            echo "✅ Frontend deployed successfully"
          else
            echo "⚠️  Unexpected status: $STATUS (may need a moment to load)"
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
