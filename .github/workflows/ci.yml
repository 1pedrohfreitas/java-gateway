deploy-swarm:
  runs-on: ubuntu-latest
  needs: [changes, test-backend]
  if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'

  env:
    HOST: ${{ secrets.SSH_HOST }}
    USER: ${{ secrets.SSH_USER }}
    PORT: ${{ secrets.SSH_PORT }}

  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: temurin
        cache: maven

    - name: Build
      run: ./mvnw clean package -DskipTests -B

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts

    - name: Deploy Swarm
      run: |
        REPO_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)

        ssh -i ~/.ssh/deploy_key -p "$PORT" "$USER@$HOST" "
          set -e

          APP_DIR=/root/deploy/$REPO_NAME

          if [ ! -d \$APP_DIR ]; then
            git clone https://github.com/${GITHUB_REPOSITORY}.git \$APP_DIR
          fi

          cd \$APP_DIR
          git pull origin main

          docker stack deploy -c docker-stack.yml $REPO_NAME --prune --resolve-image always
        "

    - run: rm -f ~/.ssh/deploy_key