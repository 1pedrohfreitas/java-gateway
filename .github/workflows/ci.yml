name: CI/CD

on:
  push:
    branches: [main, develop]

env:
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_PORT: ${{ secrets.SSH_PORT }}

jobs:

  # ==========================================================
  # Build Backend Docker image
  # ==========================================================
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          IMAGE_TAG="${GITHUB_SHA:0:8}"
          IMAGE_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"

          docker build -t "$IMAGE_NAME-backend:$IMAGE_TAG" .
          docker save -o /tmp/image-backend.tar "$IMAGE_NAME-backend:$IMAGE_TAG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-backend
          path: /tmp/image-backend.tar
          retention-days: 1

  # ==========================================================
  # Build Frontend Docker image
  # ==========================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          IMAGE_TAG="${GITHUB_SHA:0:8}"
          IMAGE_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"

          docker build -t "$IMAGE_NAME-frontend:$IMAGE_TAG" frontend
          docker save -o /tmp/image-frontend.tar "$IMAGE_NAME-frontend:$IMAGE_TAG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-frontend
          path: /tmp/image-frontend.tar
          retention-days: 1

  # ==========================================================
  # Deploy — waits for both builds, then uploads + deploys
  # ==========================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: |
      !cancelled() &&
      needs['build-backend'].result == 'success' &&
      needs['build-frontend'].result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download backend image
        uses: actions/download-artifact@v4
        with:
          name: image-backend
          path: /tmp

      - name: Download frontend image
        uses: actions/download-artifact@v4
        with:
          name: image-frontend
          path: /tmp

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          REPONAME=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)
          TAG="${GITHUB_SHA:0:8}"
          BRANCH="${GITHUB_REF#refs/heads/}"

          # Upload images + stack file
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" \
            /tmp/image-backend.tar \
            /tmp/image-frontend.tar \
            docker-stack.yml \
            "$SSH_USER@$SSH_HOST:/tmp/"

          # Deploy on server
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash -s "$REPONAME" "$BRANCH" "$TAG" "$GITHUB_REPOSITORY" << 'DEPLOY'
            set -e
            REPO="$1"
            BRANCH="$2"
            TAG="$3"
            GH_REPO="$4"

            APP_DIR="$HOME/deploy/$REPO"

            if [ ! -d "$APP_DIR" ]; then
              git clone "https://github.com/$GH_REPO.git" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin && git checkout "$BRANCH" && git pull origin "$BRANCH"

            # Load pre-built images
            echo "=== Loading images ==="
            docker load -i /tmp/image-backend.tar
            docker load -i /tmp/image-frontend.tar
            rm -f /tmp/image-backend.tar /tmp/image-frontend.tar

            # Deploy stack
            echo "=== Deploying stack ==="
            IMAGE_BACKEND="${REPO}-backend" IMAGE_FRONTEND="${REPO}-frontend" IMAGE_TAG="$TAG" \
              docker stack deploy -c /tmp/docker-stack.yml "$REPO" --prune --resolve-image always
            rm -f /tmp/docker-stack.yml

            # Verify
            echo "=== Waiting for services ==="
            sleep 15
            docker stack services "$REPO"

            echo "=== Health check ==="
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/health 2>/dev/null || echo "000")
              echo "Backend $i: HTTP $STATUS"
              [ "$STATUS" = "200" ] && break
              sleep 6
            done
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost/ 2>/dev/null || echo "000")
              echo "Frontend $i: HTTP $STATUS"
              [ "$STATUS" = "200" ] && echo "✅ Deploy OK" && exit 0
              sleep 6
            done

            echo "⚠️  Health check failed — logs:"
            docker service logs "${REPO}_gateway" --tail 20 || true
            docker service logs "${REPO}_frontend" --tail 20 || true
            exit 1
          DEPLOY

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
