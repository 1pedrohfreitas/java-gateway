name: CI/CD

on:
  push:
    branches: [main, develop]

env:
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_PORT: ${{ secrets.SSH_PORT }}

jobs:

  # ==========================================================
  # Build Backend Docker image
  # ==========================================================
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_TAG="${GITHUB_SHA:0:8}"
          IMAGE_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)
          OWNER=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]')
          GHCR_PREFIX="ghcr.io/${OWNER}/${IMAGE_NAME}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          echo "GHCR_BACKEND=${GHCR_PREFIX}-backend:$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Build and push image
        run: |
          docker build \
            -t "$IMAGE_NAME-backend:$IMAGE_TAG" \
            -t "${GHCR_BACKEND}" \
            .
          docker push "${GHCR_BACKEND}"

          # Save for downstream deploy job
          docker save -o /tmp/image-backend.tar "$IMAGE_NAME-backend:$IMAGE_TAG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-backend
          path: /tmp/image-backend.tar
          retention-days: 1

  # ==========================================================
  # Build Frontend Docker image
  # ==========================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_TAG="${GITHUB_SHA:0:8}"
          IMAGE_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)
          OWNER=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]')
          GHCR_PREFIX="ghcr.io/${OWNER}/${IMAGE_NAME}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          echo "GHCR_FRONTEND=${GHCR_PREFIX}-frontend:$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Build and push image
        run: |
          docker build \
            -t "$IMAGE_NAME-frontend:$IMAGE_TAG" \
            -t "${GHCR_FRONTEND}" \
            frontend
          docker push "${GHCR_FRONTEND}"

          # Save for downstream deploy job
          docker save -o /tmp/image-frontend.tar "$IMAGE_NAME-frontend:$IMAGE_TAG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-frontend
          path: /tmp/image-frontend.tar
          retention-days: 1

  # ==========================================================
  # Deploy — waits for both builds, then uploads + deploys
  # ==========================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: |
      !cancelled() &&
      needs['build-backend'].result == 'success' &&
      needs['build-frontend'].result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          echo "HOST='$SSH_HOST'"
          echo "PORT='$SSH_PORT'"

      - name: Deploy
        run: |
          REPONAME=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)
          TAG="${GITHUB_SHA:0:8}"
          BRANCH="${GITHUB_REF#refs/heads/}"

          # Upload images + stack file
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" \
            /tmp/image-backend.tar \
            /tmp/image-frontend.tar \
            docker-stack.yml \
            "$SSH_USER@$SSH_HOST:/tmp/"

          # Deploy on server
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash -s "$REPONAME" "$BRANCH" "$TAG" "$GITHUB_REPOSITORY" << 'DEPLOY'
            set -e
            REPO="$1"
            BRANCH="$2"
            TAG="$3"
            GH_REPO="$4"

            APP_DIR="$HOME/deploy/$REPO"

            if [ ! -d "$APP_DIR" ]; then
              git clone "https://github.com/$GH_REPO.git" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin && git checkout "$BRANCH" && git pull origin "$BRANCH"

            # Load pre-built images
            echo "=== Loading images ==="
            docker load -i /tmp/image-backend.tar
            docker load -i /tmp/image-frontend.tar
            rm -f /tmp/image-backend.tar /tmp/image-frontend.tar

            # Deploy stack
            echo "=== Deploying stack ==="
            IMAGE_BACKEND="${REPO}-backend" IMAGE_FRONTEND="${REPO}-frontend" IMAGE_TAG="$TAG" \
              docker stack deploy -c /tmp/docker-stack.yml "$REPO" --prune --resolve-image always
            rm -f /tmp/docker-stack.yml

            # Verify
            echo "=== Waiting for services ==="
            docker stack services "$REPO"

            # Wait for replicas to come up (Spring Boot + JPA takes 30-60s first time)
            echo "=== Waiting for replicas ==="
            for i in $(seq 1 20); do
              GATEWAY_UP=$(docker service ls --filter name="${REPO}_gateway" --format '{{.Replicas}}' | grep -E '^[1-9]/' || true)
              FRONTEND_UP=$(docker service ls --filter name="${REPO}_frontend" --format '{{.Replicas}}' | grep -E '^[1-9]/' || true)
              if [ -n "$GATEWAY_UP" ] && [ -n "$FRONTEND_UP" ]; then
                echo "✅ Replicas running after $((i*5))s"
                break
              fi
              sleep 5
            done
            docker stack services "$REPO"

            # Health check
            echo "=== Health check ==="
            OK=true
            for i in $(seq 1 10); do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/health 2>/dev/null || echo "000")
              echo "Backend $i: HTTP $STATUS"
              if [ "$STATUS" != "200" ]; then OK=false; fi
              sleep 5
            done
            for i in $(seq 1 10); do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost/ 2>/dev/null || echo "000")
              echo "Frontend $i: HTTP $STATUS"
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ]; then OK=true; fi
              sleep 5
            done
            $OK && echo "✅ Deploy OK" && exit 0

            echo "⚠️  Health check failed — logs:"
            docker service logs "${REPO}_gateway" --tail 30 || true
            docker service logs "${REPO}_frontend" --tail 30 || true
            exit 1
          DEPLOY

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
