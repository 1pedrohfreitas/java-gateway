name: CI/CD

on:
  push:
    branches: [main, develop]

jobs:
  deploy-swarm:
    runs-on: ubuntu-latest

    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy Swarm
        run: |
          REPO_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)
          BRANCH="${GITHUB_REF#refs/heads/}"

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e

            APP_DIR=\$HOME/deploy/$REPO_NAME

            if [ ! -d \$APP_DIR ]; then
              git clone https://github.com/${GITHUB_REPOSITORY}.git \$APP_DIR
            fi

            cd \$APP_DIR
            git pull origin $BRANCH

            docker stack deploy -c docker-stack.yml $REPO_NAME --prune --resolve-image always
          "

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key