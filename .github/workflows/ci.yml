name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Deploy Backend JAR'
        type: boolean
        default: true
      deploy_frontend:
        description: 'Deploy Frontend Admin'
        type: boolean
        default: true
      skip_tests:
        description: 'Skip tests'
        type: boolean
        default: false

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '24'

jobs:

  # ==========================================================
  # Detect changed paths
  # ==========================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'src/**'
              - 'pom.xml'
              - '.github/workflows/ci.yml'
              - 'deploy/api-gateway.service'
              - 'Dockerfile'
              - 'entrypoint.sh'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
              - 'deploy/nginx-gateway-admin.conf'

  # ==========================================================
  # Backend Test
  # ==========================================================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: changes
    if: |
      !cancelled() &&
      (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      !(github.event_name == 'workflow_dispatch' && inputs.skip_tests)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
      - run: ./mvnw test -B
      - if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Tests
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit

  # ==========================================================
  # Backend Deploy → VPS
  # ==========================================================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [changes, test-backend]
    if: |
      !cancelled() &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || inputs.deploy_backend)
    env:
      SSH_FLAGS: -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: ./mvnw clean package -DskipTests -B

      - name: Setup SSH
        run: |
          if [ -z "$HOST" ] || [ -z "$KEY" ]; then
            echo "❌ Missing SSH_HOST or SSH_PRIVATE_KEY secret"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key >/dev/null 2>&1 || { echo "❌ Invalid SSH key"; exit 1; }
          ssh-keyscan -p "${PORT:-22}" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          HOST: ${{ secrets.SSH_HOST }}
          PORT: ${{ secrets.SSH_PORT }}
          KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy
        run: |
          ssh ${SSH_FLAGS} "${USER}@${HOST}" \
            "id -u api-gateway &>/dev/null || useradd -r -s /bin/false api-gateway; \
             mkdir -p /opt/api-gateway; chown -R api-gateway:api-gateway /opt/api-gateway"

          JAR=$(ls target/api-gateway-*.jar | grep -v original | head -1)
          rsync -avz -e "ssh ${SSH_FLAGS}" "$JAR" "${USER}@${HOST}:/opt/api-gateway/api-gateway.jar"

          scp ${SSH_FLAGS} deploy/api-gateway.service "${USER}@${HOST}:/etc/systemd/system/api-gateway.service"
          ssh ${SSH_FLAGS} "${USER}@${HOST}" \
            "chown api-gateway:api-gateway /opt/api-gateway/api-gateway.jar && \
             systemctl daemon-reload && systemctl enable api-gateway && \
             (systemctl is-active --quiet api-gateway && systemctl restart api-gateway || systemctl start api-gateway)"

          sleep 8
          for i in 1 2 3 4 5; do
            set +e
            STATUS=$(ssh ${SSH_FLAGS} "${USER}@${HOST}" \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/health" 2>/dev/null) || STATUS="000"
            set -e
            [ "$STATUS" = "200" ] && echo "✅ Deploy OK" && exit 0
            sleep 4
          done
          echo "⚠️  Health check failed"
        env:
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}

      - if: always()
        run: rm -f ~/.ssh/deploy_key

  # ==========================================================
  # Frontend Deploy → VPS
  # ==========================================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: |
      !cancelled() &&
      needs.changes.result == 'success' &&
      (needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || inputs.deploy_frontend)
    defaults:
      run:
        working-directory: frontend
    env:
      SSH_FLAGS: -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || '/api/gateway' }}

      - name: Setup SSH
        run: |
          if [ -z "$HOST" ] || [ -z "$KEY" ]; then
            echo "❌ Missing SSH_HOST or SSH_PRIVATE_KEY secret"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key >/dev/null 2>&1 || { echo "❌ Invalid SSH key"; exit 1; }
          ssh-keyscan -p "${PORT:-22}" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          HOST: ${{ secrets.SSH_HOST }}
          PORT: ${{ secrets.SSH_PORT }}
          KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy
        run: |
          ssh ${SSH_FLAGS} "${USER}@${HOST}" "mkdir -p /var/www/api-gateway-admin"
          rsync -avz --delete -e "ssh ${SSH_FLAGS}" dist/ "${USER}@${HOST}:/var/www/api-gateway-admin/"

          scp ${SSH_FLAGS} ../deploy/nginx-gateway-admin.conf "${USER}@${HOST}:/etc/nginx/sites-available/api-gateway-admin"
          ssh ${SSH_FLAGS} "${USER}@${HOST}" \
            "command -v nginx || (apt-get update -qq && apt-get install -y -qq nginx); \
             ln -sf /etc/nginx/sites-available/api-gateway-admin /etc/nginx/sites-enabled/; \
             nginx -t && systemctl reload nginx"

          set +e
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "http://${HOST}/" 2>/dev/null) || STATUS="000"
          set -e
          [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ] && echo "✅ Deploy OK" || echo "⚠️  Status: $STATUS"
        env:
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}

      - if: always()
        run: rm -f ~/.ssh/deploy_key

  # ==========================================================
  # Docker Swarm (só em tags v*)
  # ==========================================================
  swarm-build:
    name: Swarm Build
    runs-on: ubuntu-latest
    needs: test-backend
    if: |
      !cancelled() &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      startsWith(github.ref, 'refs/tags/v')
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}/${{ github.repository }}/api-gateway
          tags: type=ref,event=tag
      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  swarm-deploy:
    name: Swarm Deploy
    runs-on: ubuntu-latest
    needs: swarm-build
    if: |
      !cancelled() && needs.swarm-build.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/swarm_key
          chmod 600 ~/.ssh/swarm_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          TAG="${{ needs.swarm-build.outputs.image_tag }}"
          REG="${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}/${{ github.repository }}"
          scp -i ~/.ssh/swarm_key docker-stack.yml "${USER}@${HOST}:/tmp/docker-stack.yml"
          ssh -i ~/.ssh/swarm_key "${USER}@${HOST}" \
            "DOCKER_REGISTRY=${REG} IMAGE_TAG=${TAG} \
             docker stack deploy -c /tmp/docker-stack.yml api-gateway --prune --resolve-image always"
          rm -f ~/.ssh/swarm_key
        env:
          HOST: ${{ secrets.SWARM_PROD_HOST }}
          USER: ${{ secrets.SWARM_PROD_USER }}
          KEY: ${{ secrets.SWARM_PROD_SSH_KEY }}
