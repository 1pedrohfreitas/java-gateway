name: Build & Deploy to Swarm

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        type: choice
        default: 'staging'
        options: [staging, production]

env:
  JAVA_VERSION: '21'
  DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}
  IMAGE_NAME: ${{ github.repository }}/api-gateway

jobs:
  # ============================================================
  # Test
  # ============================================================
  test:
    name: Test (Java ${{ env.JAVA_VERSION }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: ./mvnw test -B

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Tests
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit

  # ============================================================
  # Build & Push Docker Image
  # ============================================================
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: |
      !cancelled() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      github.event_name != 'pull_request'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_full: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ============================================================
  # Deploy to Staging Swarm
  # ============================================================
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    if: |
      !cancelled() &&
      needs.build.result == 'success' &&
      (github.ref == 'refs/heads/develop' ||
       (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging'))
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy stack to staging
        run: |
          echo "Deploying image: ${{ needs.build.outputs.image_full }}"
          echo "Target: ${{ secrets.SWARM_STAGING_HOST }}"
          # In production, use cssnr/deploy-stack-action or similar
          # For now: SSH and docker stack deploy
          mkdir -p ~/.ssh
          echo "${{ secrets.SWARM_STAGING_SSH_KEY }}" > ~/.ssh/swarm_key
          chmod 600 ~/.ssh/swarm_key
          ssh-keyscan -H ${{ secrets.SWARM_STAGING_HOST }} >> ~/.ssh/known_hosts || true

          export IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          export DOCKER_REGISTRY="${{ env.DOCKER_REGISTRY }}"

          scp -i ~/.ssh/swarm_key docker-stack.yml \
            ${{ secrets.SWARM_STAGING_USER }}@${{ secrets.SWARM_STAGING_HOST }}:/tmp/docker-stack.yml

          ssh -i ~/.ssh/swarm_key \
            ${{ secrets.SWARM_STAGING_USER }}@${{ secrets.SWARM_STAGING_HOST }} \
            "DOCKER_REGISTRY=${DOCKER_REGISTRY} IMAGE_TAG=${IMAGE_TAG} \
             docker stack deploy -c /tmp/docker-stack.yml api-gateway-staging --prune --resolve-image always"

          rm -f ~/.ssh/swarm_key

  # ============================================================
  # Deploy to Production Swarm
  # ============================================================
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build
    if: |
      !cancelled() &&
      needs.build.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' && inputs.environment == 'production'))
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy stack to production
        run: |
          echo "Deploying image: ${{ needs.build.outputs.image_full }}"
          echo "Target: ${{ secrets.SWARM_PROD_HOST }}"

          mkdir -p ~/.ssh
          echo "${{ secrets.SWARM_PROD_SSH_KEY }}" > ~/.ssh/swarm_key
          chmod 600 ~/.ssh/swarm_key
          ssh-keyscan -H ${{ secrets.SWARM_PROD_HOST }} >> ~/.ssh/known_hosts || true

          export IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          export DOCKER_REGISTRY="${{ env.DOCKER_REGISTRY }}"

          scp -i ~/.ssh/swarm_key docker-stack.yml \
            ${{ secrets.SWARM_PROD_USER }}@${{ secrets.SWARM_PROD_HOST }}:/tmp/docker-stack.yml

          ssh -i ~/.ssh/swarm_key \
            ${{ secrets.SWARM_PROD_USER }}@${{ secrets.SWARM_PROD_HOST }} \
            "DOCKER_REGISTRY=${DOCKER_REGISTRY} IMAGE_TAG=${IMAGE_TAG} \
             docker stack deploy -c /tmp/docker-stack.yml api-gateway --prune --resolve-image always"

          rm -f ~/.ssh/swarm_key

  # ============================================================
  # Security Scan
  # ============================================================
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: |
      !cancelled() &&
      needs.build.result == 'success' &&
      github.event_name != 'pull_request'
    steps:
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
          format: 'table'
          exit-code: 0
          severity: 'CRITICAL,HIGH'
