# Nginx — API Gateway Admin Panel
#
# Deploy path: /var/www/api-gateway-admin
# This serves the React SPA and proxies /api requests to the gateway backend.

server {
    listen 80;
    server_name _;

    # Root directory for the React admin panel
    root /var/www/api-gateway-admin;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 500;
    gzip_vary on;

    # ---- API proxy to gateway backend ----
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ---- Actuator health check ----
    location /actuator/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # ---- SPA fallback: serve index.html for all non-file requests ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Cache static assets aggressively ----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- Logs ----
    access_log /var/log/nginx/api-gateway-admin-access.log;
    error_log /var/log/nginx/api-gateway-admin-error.log;
}
