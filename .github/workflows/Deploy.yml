name: Deploy (Full Stack)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Deploy Backend?'
        required: true
        type: boolean
        default: true
      deploy_frontend:
        description: 'Deploy Frontend?'
        required: true
        type: boolean
        default: true
      skip_tests:
        description: 'Skip backend tests?'
        required: false
        type: boolean
        default: false

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'

jobs:
  # ============================================================
  # Backend: Test → Build → Deploy
  # ============================================================
  backend:
    name: Backend
    # Run on push to main, or when workflow_dispatch has deploy_backend=true
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_backend)
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && !inputs.skip_tests)
        run: ./mvnw test -B

      - name: Build JAR
        run: ./mvnw clean package -DskipTests -B

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT || '22' }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare server
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "id -u api-gateway &>/dev/null || useradd -r -s /bin/false api-gateway; \
             mkdir -p /opt/api-gateway; \
             chown -R api-gateway:api-gateway /opt/api-gateway"

      - name: Deploy JAR
        run: |
          JAR_FILE=$(ls target/api-gateway-*.jar | grep -v original | head -1)
          echo "Uploading: $JAR_FILE"
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }}" \
            "$JAR_FILE" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/api-gateway/api-gateway.jar

      - name: Update systemd & restart
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.SSH_PORT || '22' }} \
            deploy/api-gateway.service \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/etc/systemd/system/api-gateway.service

          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "chown api-gateway:api-gateway /opt/api-gateway/api-gateway.jar && \
             systemctl daemon-reload && \
             systemctl enable api-gateway && \
             (systemctl is-active --quiet api-gateway && systemctl restart api-gateway || systemctl start api-gateway)"

      - name: Verify backend health
        run: |
          sleep 10
          for i in 1 2 3 4 5; do
            set +e
            STATUS=$(ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/health" 2>/dev/null) || STATUS="000"
            set -e
            echo "Health check $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend healthy"
              exit 0
            fi
            sleep 4
          done
          echo "⚠️  Backend health check failed after 5 attempts"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ============================================================
  # Frontend: Build → Deploy → Nginx
  # ============================================================
  frontend:
    name: Frontend
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT || '22' }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare server directory
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /var/www/api-gateway-admin"

      - name: Deploy static files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }}" \
            dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/api-gateway-admin/

      - name: Configure nginx
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.SSH_PORT || '22' }} \
            ../deploy/nginx-gateway-admin.conf \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/etc/nginx/sites-available/api-gateway-admin

          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "command -v nginx || (apt-get update -qq && apt-get install -y -qq nginx); \
             ln -sf /etc/nginx/sites-available/api-gateway-admin /etc/nginx/sites-enabled/; \
             nginx -t && systemctl reload nginx"

      - name: Verify frontend
        run: |
          set +e
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://${{ secrets.SSH_HOST }}/ 2>/dev/null) || STATUS="000"
          set -e
          echo "Frontend HTTP status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            echo "✅ Frontend OK"
          else
            echo "⚠️  Unexpected status (may need a moment)"
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
